<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Principal Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #667eea, #764ba2);
  padding: 30px;
}

/* Container */
.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 500px;
  margin: auto;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  text-align: center;
}

/* Headings */
h2 {
  margin-bottom: 20px;
}

h3 {
  margin-top: 20px;
}

/* Class buttons grid */
.class-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

/* Buttons */
button {
  padding: 10px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

/* Danger section */
.warning {
  color: red;
  font-weight: bold;
  margin-top: 10px;
}

.danger-btn {
  background: #e53e3e;
  margin-top: 10px;
}

.danger-btn:hover {
  background: #c53030;
}

/* Success message */
.success {
  color: green;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Principal Dashboard</h2>

<h3>Select Class</h3>

<div class="class-grid">
<a href="/principal/class/6"><button>6th</button></a>
<a href="/principal/class/7"><button>7th</button></a>
<a href="/principal/class/8"><button>8th</button></a>
<a href="/principal/class/9"><button>9th</button></a>
<a href="/principal/class/10"><button>10th</button></a>
<a href="/principal/class/11"><button>11th</button></a>
<a href="/principal/class/12"><button>12th</button></a>
</div>

<h3>Yearly Reset (New Academic Year)</h3>

<p class="warning">
⚠ Warning: This will delete ALL students and marks from the system.
</p>

<form action="/principal/delete-all" method="post"
onsubmit="return confirm('Are you sure you want to delete all school data?');">

<button type="submit" class="danger-btn">
Reset Entire School Data
</button>

</form>

<p class="success" th:text="${message}"></p>

</div>

</body>
</html>
