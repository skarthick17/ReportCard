<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 300px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 95%;
  padding: 10px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Report Card Login</h2>

<form action="/login" method="post">

<label>Username</label>
<input type="text" name="username">

<label>Password</label>
<input type="password" name="password">

<button type="submit">Login</button>

</form>

<p th:text="${error}" class="error"></p>

</div>

</body>
</html>
